name: 'graph-sync'
description: 'Graph Sync using worai by WordLift'
author: 'WordLift'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  profile:
    description: 'Profile name defined in worai config'
    required: true
  config_path:
    description: 'Optional path passed as --config to worai'
    required: false
    default: ''
  debug:
    description: 'Enable --debug (true/false)'
    required: false
    default: 'false'
  working_directory:
    description: 'Directory where worai should run'
    required: false
    default: '.'
  worai_version:
    description: 'Pinned worai version to install'
    required: false
    default: '6.0.0'
  install_playwright:
    description: 'Install Playwright Python package and browser binaries (true/false)'
    required: false
    default: 'true'
  playwright_version:
    description: 'Pinned Playwright Python package version to install'
    required: false
    default: '1.55.0'
  playwright_browser:
    description: 'Playwright browser to install'
    required: false
    default: 'chromium'

runs:
  using: 'composite'
  steps:
    - name: Install worai
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/install-worai.sh"
      env:
        INPUT_WORAI_VERSION: ${{ inputs.worai_version }}

    - name: Install Playwright
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/install-playwright.sh"
      env:
        INPUT_INSTALL_PLAYWRIGHT: ${{ inputs.install_playwright }}
        INPUT_PLAYWRIGHT_VERSION: ${{ inputs.playwright_version }}
        INPUT_PLAYWRIGHT_BROWSER: ${{ inputs.playwright_browser }}

    - name: Run worai graph sync
      shell: bash
      run: "$GITHUB_ACTION_PATH/scripts/run-worai.sh"
      env:
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        INPUT_DEBUG: ${{ inputs.debug }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
